name: Create or Update Release Branch

run-name: Create or update release-${{ inputs.product_version }} from tag ${{ inputs.tag }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to base the release on (e.g., v0.5.0)"
        required: true
        type: string
      product_version:
        description: "RHOAI product version (e.g., 3.4 or 3.4-ea.1)"
        required: true
        type: string

permissions: {}

jobs:
  create-or-update-release-branch:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag }}
      PRODUCT_VERSION: ${{ inputs.product_version }}
      BRANCH: release-${{ inputs.product_version }}
    steps:
      - name: Validate tag format
        run: |
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid tag format '${TAG}'. Expected format: v<major>.<minor>.<patch> (e.g., v0.5.0)"
            exit 1
          fi
          echo "Tag format '${TAG}' is valid"

      - name: Validate product_version format
        run: |
          if [[ ! "${PRODUCT_VERSION}" =~ ^[0-9]+\.[0-9]+(-ea\.[0-9]+)?$ ]]; then
            echo "::error::Invalid product_version format '${PRODUCT_VERSION}'. Expected format: <major>.<minor> or <major>.<minor>-ea.<N> (e.g., 3.4 or 3.4-ea.1)"
            exit 1
          fi
          echo "product_version format '${PRODUCT_VERSION}' is valid"

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - name: Validate tag exists
        run: |
          if ! git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag '${TAG}' does not exist in this repository"
            exit 1
          fi
          echo "Tag '${TAG}' exists"

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check if release branch exists
        id: check-branch
        run: |
          if git rev-parse --verify "refs/remotes/origin/${BRANCH}" >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "Branch '${BRANCH}' already exists, will merge tag '${TAG}'"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
            echo "Branch '${BRANCH}' does not exist, will create from tag '${TAG}'"
          fi

      - name: Create release branch from tag
        if: steps.check-branch.outputs.exists == 'false'
        run: |
          git checkout "tags/${TAG}"
          git checkout -b "${BRANCH}"
          echo "Created branch '${BRANCH}' from tag '${TAG}'"

      - name: Merge tag into existing release branch
        if: steps.check-branch.outputs.exists == 'true'
        run: |
          git checkout "${BRANCH}"
          if ! git merge "tags/${TAG}" -m "chore: merge tag ${TAG} into ${BRANCH}"; then
            echo "::error::Merge conflict merging tag '${TAG}' into '${BRANCH}'. Manual resolution required."
            git merge --abort
            exit 1
          fi
          echo "Merged tag '${TAG}' into branch '${BRANCH}'"

      - name: Copy ODH workflows from main
        run: |
          workflows=(
            ".github/workflows/odh-create-tag.yml"
            ".github/workflows/odh-dispatch-version-update-to-odh-distribution.yml"
          )

          for workflow in "${workflows[@]}"; do
            if ! git show "origin/main:${workflow}" >/dev/null 2>&1; then
              echo "::error::${workflow} not found on main branch"
              exit 1
            fi
            git checkout origin/main -- "${workflow}"
            echo "Copied ${workflow} from main to release branch"
          done

      - name: Commit ODH workflows
        run: |
          git add ".github/workflows/odh-create-tag.yml" \
                 ".github/workflows/odh-dispatch-version-update-to-odh-distribution.yml"
          if git diff --cached --quiet; then
            echo "All workflows already up to date, skipping commit"
          else
            git commit -m "ci: sync ODH workflows on ${BRANCH}"
          fi

      - name: Calculate project version
        id: project-version
        run: |
          BASE_VERSION="${TAG#v}"
          PROJECT_VERSION="${BASE_VERSION}+rhaiv.0"
          echo "project_version=${PROJECT_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Calculated project version: ${PROJECT_VERSION}"

      - name: Update pyproject.toml with pinned version
        env:
          PROJECT_VERSION: ${{ steps.project-version.outputs.project_version }}
        run: |
          # First run: replace dynamic version with pinned (new branch from tag)
          # Second run: update already-pinned version (existing branch)
          sed -i 's/^dynamic = \["version"\]/version = "'"${PROJECT_VERSION}"'"/' pyproject.toml
          sed -i '/^\[project\]$/,/^\[/{s/^version = ".*"/version = "'"${PROJECT_VERSION}"'"/}' pyproject.toml

      - name: Verify pyproject.toml was updated
        env:
          PROJECT_VERSION: ${{ steps.project-version.outputs.project_version }}
        run: |
          if ! grep -q "^version = \"${PROJECT_VERSION}\"" pyproject.toml; then
            echo "::error::Failed to update pyproject.toml. Expected line 'version = \"${PROJECT_VERSION}\"' was not found"
            exit 1
          fi
          echo "pyproject.toml updated: version = \"${PROJECT_VERSION}\""

      - name: Commit version change
        env:
          PROJECT_VERSION: ${{ steps.project-version.outputs.project_version }}
        run: |
          git add pyproject.toml
          if git diff --cached --quiet; then
            echo "Version already set to ${PROJECT_VERSION}, skipping commit"
          else
            git commit -m "chore: set version to ${PROJECT_VERSION} for ${BRANCH}"
          fi

      - name: Push release branch
        run: |
          git push origin "${BRANCH}"
          echo "Successfully pushed branch '${BRANCH}'"
