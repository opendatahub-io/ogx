name: Dispatch Version Update to ODH Distribution

run-name: "Dispatch version update to llama-stack-distribution (${{ github.ref_name }})"

on:
  push:
    tags:
      - 'v*\+rhaiv.*'

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Determine product version from release branch
        id: product-version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          RELEASE_BRANCH=$(git branch -r --points-at "tags/${TAG}" \
            | sed -n 's|^[[:space:]]*origin/release-||p')

          MATCH_COUNT=$(echo "${RELEASE_BRANCH}" | grep -c . || true)

          if [[ "${MATCH_COUNT}" -eq 0 ]]; then
            echo "::error::Could not determine product version: no release branch found pointing at tag ${TAG}"
            exit 1
          fi

          if [[ "${MATCH_COUNT}" -gt 1 ]]; then
            echo "::error::Ambiguous product version: multiple release branches point at tag ${TAG}: ${RELEASE_BRANCH}"
            exit 1
          fi

          if [[ ! "${RELEASE_BRANCH}" =~ ^[0-9]+\.[0-9]+(-ea\.[0-9]+)?$ ]]; then
            echo "::error::Derived product version '${RELEASE_BRANCH}' does not match expected format <major>.<minor> or <major>.<minor>-ea.<N>"
            exit 1
          fi

          echo "product_version=${RELEASE_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "Determined product version: ${RELEASE_BRANCH}"

      - name: Send repository dispatch to llama-stack-distribution
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAG: ${{ github.ref_name }}
          PRODUCT_VERSION: ${{ steps.product-version.outputs.product_version }}
          SOURCE_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          echo "Dispatching create-or-update-release-branch with tag: ${TAG}, product version: ${PRODUCT_VERSION}"

          gh api repos/opendatahub-io/llama-stack-distribution/dispatches \
            -f event_type=create-or-update-release-branch \
            -f "client_payload[tag]=${TAG}" \
            -f "client_payload[product_version]=${PRODUCT_VERSION}" \
            -f "client_payload[source_run_url]=${SOURCE_RUN_URL}"

          echo "Dispatch sent successfully"
